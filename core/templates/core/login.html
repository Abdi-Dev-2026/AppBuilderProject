<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #4834d4 0%, #6f42c1 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .auth-card h2 { font-weight: 800; color: #333; text-align: center; margin-bottom: 25px; }
        .btn-auth { background: #6f42c1; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-auth:hover { background: #4834d4; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="auth-card shadow-lg">
    <h2>Soo Gal (Login)</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-auth">Login</button>
    </form>

    <p class="text-center mt-4 text-muted">Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-decoration-none" style="color: #6f42c1;">Register</a></p>
</div>

</body>
</html>
