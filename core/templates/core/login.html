<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soo Gal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #24243e, #302b63, #0f0c29); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: white; }
        .auth-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 45px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 420px; text-align: center; }
        .auth-card h2 { font-weight: 800; margin-bottom: 10px; }
        .auth-card p.subtitle { color: #ccc; margin-bottom: 30px; }
        form p { text-align: left; margin-bottom: 20px; }
        form label { display: block; margin-bottom: 5px; color: #a29bfe; font-weight: bold; }
        form input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
        .btn-login { background: #6c5ce7; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-login:hover { background: #a29bfe; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }
    </style>
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
</head>
<body>

<div class="auth-card shadow-lg">

    <h2>Soo Gal 👋</h2>
    <p class="subtitle">Geli macluumaadkaaga si aad u sii waddo dhismaha apps-ka.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-login">Gali Koontada (Login)</button>
    </form>

    <div class="mt-4">
        <p>Weli koonto ma lahan? <a href="{% url 'register' %}" class="text-info fw-bold text-decoration-none">Is-diiwaangeli halkan</a></p>
    </div>
</div>
<label>
  <input type="checkbox" name="remember_me">
  I xasuuso
</label>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log("SW Registered"))
      .catch(err => console.log("SW Error", err));
  });
}
</script>

</body>
</html>
