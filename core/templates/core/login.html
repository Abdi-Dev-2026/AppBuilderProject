<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4834d4 0%, #6f42c1 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
        }
        .login-card p.subtitle {
            color: #777;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        /* Qurxinta Form-ka Django */
        form p {
            text-align: left;
            margin-bottom: 20px;
        }
        form label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }
        form input:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 8px rgba(111, 66, 193, 0.2);
        }
        .btn-login {
            background: #6f42c1;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #4834d4;
            transform: translateY(-2px);
        }
        .register-link {
            margin-top: 25px;
            color: #666;
            font-size: 0.95rem;
        }
        .register-link a {
            color: #6f42c1;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Ku soo dhowaad! 👋</h2>
    <p class="subtitle">Fadlan geli macluumaadkaaga si aad u sii waddo dhismaha apps-ka.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-fields">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn-login">Soo gal (Login)</button>
    </form>

    <div class="register-link">
        <p>Weli koonto ma lahan? <a href="{% url 'register' %}">Isdiiwaangeli halkan</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
