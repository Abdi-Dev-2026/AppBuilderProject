<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Maxamed Samee App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

/* NAV */
.nav{
  background:#0f172a;
  padding:15px;
  text-align:center;
}

.nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:50px auto;
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  border: 1px solid #1e293b;
}

/* FORM */
input, textarea{
  width: 100%;
  box-sizing: border-box; /* Si padding-ku uusan bannaanka ugu saarin */
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #334155;
  background:#1e293b;
  color:white;
  outline: none;
}

input:focus, textarea:focus {
  border-color: #2563eb;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition: 0.3s;
}

button:hover{
  background: #1d4ed8;
}

/* SOCIAL */
.social{
  margin-top:30px;
  text-align:center;
  border-top: 1px solid #334155;
  padding-top: 20px;
}

.social a{
  display:inline-block;
  margin:5px;
  color:white;
  text-decoration:none;
  background:#1e293b;
  padding:10px 20px;
  border-radius:8px;
  font-size: 0.9rem;
  transition: 0.3s;
}

.social a:hover {
  background: #334155;
}

/* ALERT MESSAGES */
.alert {
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
  text-align: center;
}
.alert-success { background: #10b981; color: white; }
</style>
 <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
</head>

<body>

<div class="nav">
  <a href="/">Home</a>
  <a href="/quiz/">Quiz</a>
  <a href="/poll/">Poll</a>
  <a href="/about/">About</a>
   <a href="{% url 'my_messages' %}">My Messages</a>
</div>

<div class="container">
  <h2>📞 Contact Us</h2>
  <p style="color:#94a3b8;">Haddii aad qabto su’aal ama aad rabto caawimaad, nala soo xiriir:</p>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-success">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Magacaaga" required>
    <input type="email" name="email" placeholder="Email-kaaga" required>
    <input type="text" name="subject" placeholder="Subject (optional)">
    <textarea name="message" rows="5" placeholder="Fariintaada qor..." required></textarea>
    <button type="submit">Dir Fariinta</button>
  </form>

  <div class="social">
    <h3>📲 Nala Soco</h3>
    <a href="https://wa.me/252616898182" target="_blank">WhatsApp</a>
    <a href="#">Instagram</a>
    <a href="#">TikTok</a>
    <a href="#">Facebook</a>
    <a href="#">Telegram</a>
  </div>

</div>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log("SW Registered"))
      .catch(err => console.log("SW Error", err));
  });
}
</script>
</body>
</html>
