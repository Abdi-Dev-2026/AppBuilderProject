<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Editor - {{ app.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 3D NEUMORPHIC DESIGN --- */
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --phone-border: #111;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            background: var(--primary-bg); 
            color: white; 
            overflow: hidden;
        }

        header {
            padding: 15px 30px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container { 
            display: flex; 
            flex: 1; 
            padding: 20px; 
            gap: 30px; 
            overflow: hidden;
        }

        /* --- EDITOR SECTION --- */
        .editors { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        label {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea { 
            width: 100%; 
            flex: 1; 
            background: #0b0f1a; 
            color: #9cdcfe; 
            border: 1px solid #334155; 
            padding: 12px; 
            font-family: 'Fira Code', monospace; 
            border-radius: 12px; 
            resize: none;
            transition: 0.3s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* --- INFINIX NOTE 40 STYLE PREVIEW --- */
        .preview-section { 
            width: 420px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .phone-case {
            position: relative;
            width: 380px; /* Waxaan u ekeysiinay Infinix Note 40 width-giisa */
            height: 780px;
            background: var(--phone-border);
            border-radius: 45px; /* Curve geesaha ah */
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 2px 2px #444;
            border: 4px solid #222;
        }

        /* Camera Notch (Punch hole) */
        .phone-case::before {
            content: "";
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background: #111;
            border-radius: 50%;
            z-index: 10;
            border: 2px solid #222;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            background: white; 
            border: none; 
            border-radius: 35px; 
        }

        /* --- BUTTONS --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .save-btn { 
            background: linear-gradient(135deg, #22c55e, #16a34a); 
            color: white; 
            padding: 15px; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold;
            border-radius: 12px; 
            flex: 1;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4); }

        .download-link {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .download-link:hover { transform: translateY(-2px); }

    </style>
</head>
<body>

    <header>
        <h2><i class="fas fa-code" style="color: var(--accent-color);"></i> App Factory: {{ app.name }}</h2>
        <span style="color: #94a3b8;">Shaashadda Live-ka ah (Infinix Note 40 View)</span>
    </header>

    <div class="container">
        <form method="post" class="editors">
            {% csrf_token %}
            <label><i class="fab fa-html5"></i> HTML Koodhka</label>
            <textarea name="html_code" id="html" placeholder="Ku qor HTML-ka halkan...">{{ app.html_code }}</textarea>
            
            <label><i class="fab fa-css3-alt"></i> CSS Qurxinta</label>
            <textarea name="css_code" id="css" placeholder="Ku qor CSS-ka halkan...">{{ app.css_code }}</textarea>
            
            <label><i class="fab fa-js"></i> JS Dhaqdhaqaaqa</label>
            <textarea name="js_code" id="js" placeholder="Ku qor JavaScript-ka halkan...">{{ app.js_code }}</textarea>
            
            <div class="controls">
                <button type="submit" class="save-btn"><i class="fas fa-cloud-upload-alt"></i> Kaydi & Daabac App-ka</button>
                <a href="{% url 'download_app' app.slug %}" class="download-link">
                    <i class="fas fa-file-archive"></i> Download ZIP
                </a>
            </div>
        </form>

        <div class="preview-section">
            <div class="phone-case">
                <iframe id="preview"></iframe>
            </div>
            <p style="margin-top: 15px; color: #94a3b8; font-size: 0.8rem;">
                <i class="fas fa-mobile-alt"></i> Muuqaalka Taleefanka (Real-time)
            </p>
        </div>
    </div>

    <script>
        function updatePreview() {
            let html = document.getElementById("html").value;
            let css = "<style>" + document.getElementById("css").value + "</style>";
            let js = "<script>" + document.getElementById("js").value + "<\/script>";
            let iframe = document.getElementById("preview");
            iframe.srcdoc = html + css + js;
        }

        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        window.onload = updatePreview;
    </script>
</body>
</html>
