<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Editor - {{ app.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.txt">
    <style>
        :root {
            --primary-bg: #0f172a;
            --editor-bg: #1e293b;
            --accent-color: #38bdf8;
            --save-green: #22c55e;
            --phone-border: #111827;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            background: var(--primary-bg); 
            color: white; 
            overflow: hidden;
        }

        /* Header Styles */
        .header {
            padding: 15px 25px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { margin: 0; font-size: 1.2rem; color: var(--accent-color); }

        .container { 
            display: flex; 
            flex: 1; 
            padding: 20px; 
            gap: 30px; 
            overflow: hidden;
        }

        /* Editor Section */
        .editors { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--editor-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .editor-group { flex: 1; display: flex; flex-direction: column; }
        
        label { 
            font-size: 0.85rem; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #94a3b8; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea { 
            width: 100%; 
            flex: 1; 
            background: #020617; 
            color: #e2e8f0; 
            border: 1px solid #334155; 
            padding: 12px; 
            font-family: 'Fira Code', monospace; 
            border-radius: 8px; 
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--accent-color); }

        /* Infinix Note 40 3D Phone Styles */
        .preview-section { 
            width: 420px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .phone-case {
            position: relative;
            width: 380px; /* Qiyaasta Infinix Note 40 Width */
            height: 780px;
            background: var(--phone-border);
            border-radius: 45px;
            padding: 12px;
            box-shadow: 
                20px 20px 60px rgba(0,0,0,0.7),
                -5px -5px 20px rgba(255,255,255,0.05),
                inset 0 0 10px rgba(255,255,255,0.2);
            border: 2px solid #334155;
            transform: perspective(1000px) rotateY(-5deg); /* 3D Look */
            transition: transform 0.5s;
        }
        
        .phone-case:hover { transform: perspective(1000px) rotateY(0deg); }

        /* Punch-hole Camera */
        .phone-case::before {
            content: "";
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #111;
            border-radius: 50%;
            z-index: 10;
            border: 2px solid #222;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid #000;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        /* Buttons Section */
        .action-area {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .save-btn { 
            background: var(--save-green); 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold;
            border-radius: 8px; 
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .save-btn:hover { background: #16a34a; transform: scale(1.02); }

        .download-btn {
            background: #3b82f6;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .download-btn:hover { background: #2563eb; }

    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-code"></i> Matoorka Editor-ka: {{ app.name }}</h2>
        <div style="font-size: 0.8rem; color: #94a3b8;">Habaynta Shaashadda: <b>Infinix Note 40 Style</b></div>
    </div>

    <div class="container">
        <form method="post" class="editors" id="mainForm">
            {% csrf_token %}
            <div class="editor-group">
                <label><i class="fab fa-html5" style="color: #e34c26;"></i> HTML Koodhka</label>
                <textarea name="html_code" id="html" placeholder="Ku qor HTML halkan...">{{ app.html_code }}</textarea>
            </div>
            
            <div class="editor-group">
                <label><i class="fab fa-css3-alt" style="color: #264de4;"></i> CSS Qurxinta</label>
                <textarea name="css_code" id="css" placeholder="Ku qor CSS halkan...">{{ app.css_code }}</textarea>
            </div>
            
            <div class="editor-group">
                <label><i class="fab fa-js" style="color: #f7df1e;"></i> JS Dhaqdhaqaaqa</label>
                <textarea name="js_code" id="js" placeholder="Ku qor JavaScript halkan...">{{ app.js_code }}</textarea>
            </div>
            
            <div class="action-area">
                <button type="submit" class="save-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Kaydi & Daabac App-ka
                </button>
                <a href="{% url 'download_app' app.slug %}" class="download-btn">
                    <i class="fas fa-file-archive"></i> Download ZIP
                </a>
            </div>
        </form>

        <div class="preview-section">
            <h3 style="margin-bottom: 15px; font-size: 1rem; color: #94a3b8;">Muuqaalka Taleefanka dhabta ah</h3>
            <div class="phone-case">
                <div class="screen">
                    <iframe id="preview"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePreview() {
            let html = document.getElementById("html").value;
            let css = "<style>" + document.getElementById("css").value + "</style>";
            let js = "<script>" + document.getElementById("js").value + "<\/script>";
            
            // In koodhka gudaha ku jira uu noqdo mid responsive ah
            let meta = '<meta name="viewport" content="width=device-width, initial-scale=1.0">';
            
            let iframe = document.getElementById("preview");
            iframe.srcdoc = meta + html + css + js;
        }

        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        window.onload = updatePreview;
    </script>
</body>
</html>
