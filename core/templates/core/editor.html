<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - {{ app.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 3D NEUMORPHIC DESIGN --- */
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --phone-border: #111;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            background: var(--primary-bg); 
            color: white; 
            /* Waxaan ka saarnay overflow: hidden si moobilka loogu dhex socon karo */
        }

        header {
            padding: 15px 20px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Si uu madaxu isu dhuujiyo moobilka */
            gap: 10px;
        }

        header h2 { font-size: 1.2rem; margin: 0; }

        .container { 
            display: flex; 
            flex: 1; 
            padding: 20px; 
            gap: 20px; 
            overflow: hidden; /* Laptop-ka si uusan u jirin scroll labo ah */
        }

        /* --- EDITOR SECTION --- */
        .editors { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            min-width: 0; /* Waxay ka hortagtaa inuu dillaaco */
        }

        label {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea { 
            width: 100%; 
            flex: 1; 
            background: #0b0f1a; 
            color: #9cdcfe; 
            border: 1px solid #334155; 
            padding: 12px; 
            font-family: 'Fira Code', monospace; 
            border-radius: 12px; 
            resize: none;
            transition: 0.3s;
            outline: none;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* --- PREVIEW SECTION --- */
        .preview-section { 
            width: 400px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .phone-case {
            position: relative;
            width: 340px; 
            height: 680px;
            background: var(--phone-border);
            border-radius: 40px; 
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 4px solid #222;
            box-sizing: border-box;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            background: white; 
            border: none; 
            border-radius: 30px; 
        }

        /* --- BUTTONS --- */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .save-btn, .share-btn, .download-link { 
            padding: 12px; 
            border: none; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: bold;
            border-radius: 10px; 
            flex: 1;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            min-width: 120px;
        }

        .save-btn { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 10px rgba(34, 197, 94, 0.2); }
        .share-btn { background: linear-gradient(135deg, #a855f7, #7e22ce); }
        .download-link { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        /* --- RESPONSIVE DESIGN (MOOBILKA) --- */
        @media (max-width: 850px) {
            body {
                overflow-y: auto; /* U oggolow scroll marka moobilka la joogo */
                height: auto;
            }

            .container {
                flex-direction: column; /* Isu saar editor-ka iyo preview-ga */
                padding: 10px;
                overflow: visible;
            }

            .editors {
                height: 500px; /* Dherer go'an sii moobilka si uu scroll u yeesho dhexdiisa */
            }

            .preview-section {
                width: 100%;
                margin-top: 20px;
            }

            .phone-case {
                width: 100%;
                max-width: 320px; /* Moobillada yar yar ku habee */
                height: 600px;
            }

            header h2 { font-size: 1rem; }
        }

    </style>
     <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
</head>
<body>

    <header>
        <h2><i class="fas fa-code" style="color: var(--accent-color);"></i> Magaca app kaaga  {{ app.name }}</h2>
        <span style="color: #94a3b8; font-size: 0.8rem;">Shaashadda Live-ka ah </span>
    </header>

    <div class="container">
        <form method="post" class="editors">
            {% csrf_token %}
            <label><i class="fab fa-html5"></i>Koodka HTML</label>
            <textarea name="html_code" id="html" placeholder="HTML halkan...">{{ app.html_code }}</textarea>
            
            <label><i class="fab fa-css3-alt"></i> Koodka CSS</label>
            <textarea name="css_code" id="css" placeholder="CSS halkan...">{{ app.css_code }}</textarea>
            
            <label><i class="fab fa-js"></i>Koodka JS</label>
            <textarea name="js_code" id="js" placeholder="JS halkan...">{{ app.js_code }}</textarea>
            
            <div class="controls">
                <button type="submit" class="save-btn"><i class="fas fa-save"></i>ii Kaydi</button>
                <button type="button" onclick="copyLink()" class="share-btn"><i class="fas fa-share"></i> isii link</button>
                <a href="{% url 'download_app' app.slug %}" class="download-link"><i class="fas fa-download"></i>isii file ZIP ah</a>
            </div>
        </form>

        <div class="preview-section">
            <div class="phone-case">
                <iframe id="preview"></iframe>
            </div>
            <p style="margin-top: 15px; color: #94a3b8; font-size: 0.8rem;">
                <i class="fas fa-mobile-alt"></i> Muuqaalka Taleefanka
            </p>
        </div>
    </div>

    <script>
        function updatePreview() {
            let html = document.getElementById("html").value;
            let css = "<style>" + document.getElementById("css").value + "</style>";
            let js = "<script>" + document.getElementById("js").value + "<\/script>";
            let iframe = document.getElementById("preview");
            iframe.srcdoc = html + css + js;
        }

        function copyLink() {
            let link = "https://maxamed.up.railway.app/app/{{ app.slug }}/";
            navigator.clipboard.writeText(link).then(() => {
                alert("Link-ga waa la koobiyey!");
            });
        }

        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        window.onload = updatePreview;

        if ('serviceWorker' in navigator) {
            window.addEventListener("load", function() {
                navigator.serviceWorker.register('/static/sw.js')
                .then(() => console.log("SW Registered"))
                .catch(err => console.log("SW Error", err));
            });
        }
    </script>
</body>
</html>
