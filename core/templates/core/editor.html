<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matoorka Editor-ka - {{ app.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/common/all.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --text-main: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text-main);
            overflow: hidden;
        }

        /* Qaybta sare (Header) */
        header {
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container { 
            display: flex; 
            flex: 1; 
            padding: 20px; 
            gap: 25px; 
            overflow: hidden;
        }

        /* Qaybta Qoraalka (Editors) */
        .editors-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .editor-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label { 
            font-size: 0.85rem; 
            font-weight: 600; 
            margin-bottom: 5px; 
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea { 
            width: 100%; 
            flex: 1; 
            background: #020617; 
            color: #94a3b8; 
            border: 1px solid #334155; 
            padding: 12px; 
            font-family: 'Fira Code', monospace; 
            border-radius: 8px; 
            resize: none;
            outline: none;
            transition: border 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* Qaybta Preview-ga (Mobile 3D) */
        .preview-section { 
            width: 400px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .phone-mockup {
            position: relative;
            width: 300px;
            height: 600px;
            background: #111;
            border-radius: 40px;
            border: 8px solid #334155;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5), -5px -5px 20px rgba(255,255,255,0.02);
            padding: 10px;
            transform: perspective(1000px) rotateY(-5deg);
            transition: transform 0.5s ease;
        }

        .phone-mockup:hover {
            transform: perspective(1000px) rotateY(0deg);
        }

        .phone-speaker {
            width: 60px;
            height: 5px;
            background: #334155;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            background: white; 
            border: none; 
            border-radius: 25px; 
        }

        /* Badhannada (Buttons) */
        .action-area {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .save-btn { 
            background: linear-gradient(135deg, #22c55e, #16a34a); 
            color: white; 
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4); }

        .download-btn { 
            background: linear-gradient(135deg, #38bdf8, #0284c7); 
            color: white; 
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4); }

    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-code-branch" style="color: var(--accent-color); font-size: 1.5rem;"></i>
            <h2 style="margin: 0; font-size: 1.2rem;">Habaynta App-ka: <span style="color: var(--accent-color);">{{ app.name }}</span></h2>
        </div>
        <div style="font-size: 0.8rem; opacity: 0.7;">
            <i class="fas fa-circle" style="color: var(--success-color); font-size: 0.6rem;"></i> Matoorku waa diyaar
        </div>
    </header>

    <div class="container">
        <form method="post" class="editors-container">
            {% csrf_token %}
            
            <div class="editor-group">
                <label><i class="fab fa-html5"></i> QAAB DHISMEEDKA (HTML)</label>
                <textarea name="html_code" id="html" placeholder="Halkan ku qor HTML-ka...">{{ app.html_code }}</textarea>
            </div>
            
            <div class="editor-group">
                <label><i class="fab fa-css3-alt"></i> QURXINTA (CSS)</label>
                <textarea name="css_code" id="css" placeholder="Halkan ku qor CSS-ka...">{{ app.css_code }}</textarea>
            </div>
            
            <div class="editor-group">
                <label><i class="fab fa-js-square"></i> MATOORKA (JS)</label>
                <textarea name="js_code" id="js" placeholder="Halkan ku qor JavaScript-ka...">{{ app.js_code }}</textarea>
            </div>

            <div class="action-area">
                <button type="submit" class="btn save-btn">
                    <i class="fas fa-cloud-upload-alt"></i> KAYDI & PUBLISH
                </button>
                <a href="{% url 'download_app' app.slug %}" class="btn download-btn">
                    <i class="fas fa-file-archive"></i> SOO DEJI (ZIP)
                </a>
            </div>
        </form>

        <div class="preview-section">
            <h3 style="margin-bottom: 15px; font-size: 1rem; opacity: 0.8;">MUUQAALKA TALEEFANKA 📱</h3>
            <div class="phone-mockup">
                <div class="phone-speaker"></div>
                <iframe id="preview"></iframe>
            </div>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #64748b;">Isbeddelku wuxuu ka muuqanayaa halkan si toos ah</p>
        </div>
    </div>

    <script>
        function updatePreview() {
            let html = document.getElementById("html").value;
            let css = "<style>" + document.getElementById("css").value + "</style>";
            let js = "<script>" + document.getElementById("js").value + "<\/script>";
            let iframe = document.getElementById("preview");
            
            // Hubi in koodhku jiro, haddii kale sii default
            let content = (html || css || js) ? html + css + js : "<body style='display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#ccc;'>Sugaya koodhkaaga...</body>";
            
            iframe.srcdoc = content;
        }

        // Si toos ah u cusboonaysii marka wax la qoro
        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        // Bilow preview-ga markuu boggu furmo
        window.onload = updatePreview;
    </script>
</body>
</html>
