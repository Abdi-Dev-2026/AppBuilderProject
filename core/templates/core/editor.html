<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Editor - {{ app.name }}</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #2c3e50; color: white; }
        .container { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .editors { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; flex: 1; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; padding: 10px; font-family: monospace; border-radius: 5px; }
        .preview-section { width: 350px; text-align: center; }
        iframe { width: 320px; height: 550px; background: white; border: 10px solid #111; border-radius: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .save-btn { background: #28a745; color: white; padding: 15px; border: none; cursor: pointer; font-size: 1.1rem; border-radius: 5px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="padding-left: 20px;">Editing: {{ app.name }}</h2>

    <div class="container">
        <form method="post" class="editors">
            {% csrf_token %}
            <label>HTML Code</label>
            <textarea name="html_code" id="html">{{ app.html_code }}</textarea>
            
            <label>CSS Code</label>
            <textarea name="css_code" id="css">{{ app.css_code }}</textarea>
            
            <label>JS Code</label>
            <textarea name="js_code" id="js">{{ app.js_code }}</textarea>
            
            <button type="submit" class="save-btn">Save & Publish App</button>
        </form>

        <div class="preview-section">
            <h3>Live Preview (Mobile View) 📱</h3>
            <iframe id="preview"></iframe>
        </div>
    </div>
    <form method="POST">
    {% csrf_token %}
    <div class="mt-3 d-flex gap-3">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        
        <a href="{% url 'download_app' app.slug %}" class="btn btn-success text-white" style="text-decoration: none;">
            <i class="fas fa-download"></i> Download App (ZIP)
        </a>
    </div>
</form>

    <script>
        function updatePreview() {
            let html = document.getElementById("html").value;
            let css = "<style>" + document.getElementById("css").value + "</style>";
            let js = "<script>" + document.getElementById("js").value + "<\/script>";
            let iframe = document.getElementById("preview");
            iframe.srcdoc = html + css + js;
        }

        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        window.onload = updatePreview;
    </script>
</body>
</html>
