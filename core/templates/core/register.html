<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diiwaangelinta - My App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ubuntu', sans-serif;
            margin: 0;
            color: #fff;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
        }
        .register-container h2 {
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .register-container p.desc {
            text-align: center;
            font-size: 0.9rem;
            color: #ddd;
            margin-bottom: 30px;
        }
        /* Qurxinta Form-ka Django */
        form p {
            margin-bottom: 15px;
        }
        form label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #6c5ce7;
            font-weight: bold;
        }
        form input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        form input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6c5ce7;
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.4);
        }
        .btn-register {
            background: #6c5ce7;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-register:hover {
            background: #a29bfe;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
        }
        .footer-links a {
            color: #a29bfe;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        /* Error Message Styling */
        .error-box {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border-left: 5px solid #ff4757;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Abuur Koonto 🚀</h2>
    <p class="desc">Ku soo dhowaad! Fadlan buuxi foomka si aad u dhisato app-kaaga ugu horreeya.</p>
    
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="error-box">
                <strong>Fadlan sax khaladaadkan hoose:</strong>
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="form-content">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-register">Diiwaangeli Hadda</button>
    </form>

    <div class="footer-links">
        <p>Horey ma u leeyahay koonto? <a href="{% url 'login' %}">Soo gal (Login)</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
