<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My App Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #6f42c1 0%, #4834d4 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        .auth-card h2 { font-weight: 800; color: #333; text-align: center; margin-bottom: 25px; }
        .btn-auth { background: #6f42c1; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-auth:hover { background: #5a32a3; transform: translateY(-2px); }
        .error-msg { color: #d9534f; background: #f8d7da; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="auth-card shadow-lg">
    <h2>Diiwaangeli (Register)</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="error-msg">
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="mb-3">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-auth">Register</button>
    </form>

    <p class="text-center mt-4 text-muted">Already have an account? <a href="{% url 'login' %}" class="fw-bold text-decoration-none" style="color: #6f42c1;">Login</a></p>
</div>

</body>
</html>
