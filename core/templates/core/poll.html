<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll | Maxamed Samee App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

/* NAV */
.nav{
  background:#0f172a;
  padding:15px;
  text-align:center;
}

.nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* CONTAINER */
.container{
  max-width:600px;
  margin:50px auto;
  padding:10px;
}

/* POLL CARD */
.poll-card {
  background:#0f172a;
  padding:25px;
  border-radius:15px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}

/* BUTTONS */
.poll-btn{
  width:100%;
  padding:12px;
  margin:10px 0 5px 0;
  background:#16a34a;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  text-align: left;
  display: flex;
  justify-content: space-between;
}

.poll-btn:hover{
  background:#15803d;
}

/* BARS */
.bar{
  height:8px;
  background:#334155;
  border-radius:5px;
  margin-bottom:15px;
  overflow: hidden;
}

.fill{
  height:100%;
  background:#22c55e;
  transition: width 0.5s ease-in-out;
}

.stats {
    font-size: 0.8rem;
    color: #94a3b8;
}
</style>
</head>

<body>

<div class="nav">
  <a href="/">Home</a>
  <a href="/quiz/">Quiz</a>
  <a href="/poll/">Poll</a>
  <a href="/content/">Content</a>
</div>

<div class="container">
  <h2 style="text-align: center;">📊 Cod-bixinnada (Polls)</h2>

  {% for poll in polls %}
  <div class="poll-card">
    <form method="POST" action="{% url 'vote_poll' poll.id %}">
      {% csrf_token %}

      <p><b>{{ poll.question }}</b></p>

      <button class="poll-btn" name="choice" value="1">
        <span>A) {{ poll.option1 }}</span>
        <span>{{ poll.votes1 }} cod</span>
      </button>
      <div class="bar">
        <div class="fill" style="width: {{ poll.votes1 }}%;"></div>
      </div>

      <button class="poll-btn" name="choice" value="2">
        <span>B) {{ poll.option2 }}</span>
        <span>{{ poll.votes2 }} cod</span>
      </button>
      <div class="bar">
        <div class="fill" style="width: {{ poll.votes2 }}%;"></div>
      </div>

      <p class="stats">Wadarta guud ee codadka: {{ poll.total_votes }}</p>

    </form>
  </div>
  {% empty %}
    <div style="text-align: center; padding: 50px;">
        <p>Hadda wax cod-bixin ah ma jiraan. Admin-ka ka soo geli!</p>
    </div>
  {% endfor %}

</div>

</body>
</html>
