<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll | Maxamed Samee App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
}

/* NAV */
.nav{
  background:#0f172a;
  padding:15px;
  text-align:center;
}

.nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* CONTAINER */
.container{
  max-width:600px;
  margin:50px auto;
  background:#0f172a;
  padding:25px;
  border-radius:15px;
}

/* BUTTONS */
.poll-btn{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#16a34a;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.poll-btn:hover{
  background:#15803d;
}

/* BARS */
.bar{
  height:8px;
  background:#334155;
  border-radius:5px;
  margin-bottom:10px;
}

.fill{
  height:100%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="nav">
  <a href="/">Home</a>
  <a href="/quiz/">Quiz</a>
</div>

<div class="container">
  <h2>📊 Poll</h2>

  {% if poll %}
  <form method="POST" action="{% url 'vote_poll' poll.id %}">
    {% csrf_token %}

    <p><b>{{ poll.question }}</b></p>

    <button class="poll-btn" name="choice" value="1">
      {{ poll.option1 }} ({{ poll.votes1 }})
    </button>
    <div class="bar">
      <div class="fill" style="width:{{ poll.votes1 }}%"></div>
    </div>

    <button class="poll-btn" name="choice" value="2">
      {{ poll.option2 }} ({{ poll.votes2 }})
    </button>
    <div class="bar">
      <div class="fill" style="width:{{ poll.votes2 }}%"></div>
    </div>

  </form>
  {% else %}
    <p>Ma jiro poll hadda.</p>
  {% endif %}

</div>

</body>
</html>
