{% extends 'core/homepage.html' %}

{% block content %}
<div class="container" style="text-align: center; padding: 50px;">
    <div class="card" style="max-width: 500px; margin: auto; padding: 30px; background: #1e293b; border-radius: 15px; color: white;">
        <h2 style="color: #60a5fa;">Natiijada Quiz-ka 🧠</h2>
        <hr style="border-color: #334155;">
        
        <p style="font-size: 1.2rem; margin: 20px 0;">{{ msg }}</p>
        
        {% if status == 'correct' %}
            <div style="font-size: 70px; margin: 20px 0;">✅</div>
        {% else %}
            <div style="font-size: 70px; margin: 20px 0;">❌</div>
        {% endif %}

        <a href="/" class="btn" style="background: #2563eb; color: white; padding: 10px 25px; border-radius: 10px; text-decoration: none; display: inline-block; margin-top: 10px;">
            Ku laabo Guriga
        </a>
    </div>
</div>
{% endblock %}
